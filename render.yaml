services:
  - type: web
    name: school-management-api
    runtime: python
    plan: free
    rootDir: school-management-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: school-management-db
          property: connectionString
      - key: FRONTEND_HOST
        fromService:
          name: school-management-frontend
          type: web
          property: host

  - type: web
    name: school-management-frontend
    runtime: static
    rootDir: school-management-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: VITE_API_HOST
        fromService:
          name: school-management-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: school-management-db
    plan: free
    databaseName: school_management_system
    user: school_admin
